<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Train With Me</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="card">
        <h1>Train With Me</h1>
        <p>Simple tracker for strength, running, and sprinting.</p>
      </header>

      <section class="card">
        <h2>Add Workout</h2>
        <form id="workout-form">
          <div class="grid">
            <label>
              Date
              <input type="date" id="date" required />
            </label>

            <label>
              Activity
              <select id="activity" required>
                <option value="strength">Strength</option>
                <option value="run">Run</option>
                <option value="sprint">Sprint</option>
              </select>
            </label>
          </div>

          <div id="strength-fields" class="grid activity-fields" data-activity="strength">
            <label>
              Exercise name
              <input type="text" id="exercise-name" placeholder="e.g. Back squat" />
            </label>

            <label>
              Set reps
              <input type="number" id="strength-set-reps" min="0" placeholder="e.g. 5" />
            </label>

            <label>
              Set weight (kg)
              <input type="number" id="strength-set-weight" min="0" step="0.1" placeholder="e.g. 60" />
            </label>

            <label class="checkbox-label">
              <input type="checkbox" id="strength-set-bodyweight" />
              Body weight set
            </label>

            <button type="button" id="add-strength-set">Add Set To Exercise</button>
            <button type="button" id="add-strength-exercise">Add Exercise To Workout</button>
            <ul id="current-strength-sets" class="detail-list"></ul>
          </div>
          <ul id="strength-exercise-list" class="detail-list"></ul>

          <div id="run-fields" class="grid activity-fields" data-activity="run">
            <label>
              Distance (km)
              <input type="number" id="distance" min="0" step="0.01" placeholder="e.g. 5" />
            </label>

            <label>
              Time (min)
              <input type="number" id="time" min="0" step="0.1" placeholder="e.g. 30" />
            </label>

            <label>
              Pace (min/km)
              <input type="number" id="pace" min="0" step="0.01" placeholder="e.g. 6" />
            </label>
          </div>

          <div id="sprint-fields" class="activity-fields" data-activity="sprint">
            <p class="hint">Add each sprint set in order (seconds + meters).</p>
            <div class="grid">
              <label>
                Sprint time (sec)
                <input type="number" id="sprint-time-sec" min="0" step="0.01" placeholder="e.g. 14.2" />
              </label>
              <label>
                Sprint distance (m)
                <input type="number" id="sprint-distance-m" min="0" step="1" placeholder="e.g. 100" />
              </label>
              <button type="button" id="add-sprint-set">Add Sprint Set</button>
            </div>
            <ol id="sprint-sets-list" class="sprint-sets-list"></ol>
          </div>

          <label>
            Notes
            <textarea id="notes" rows="3" placeholder="How did it feel?"></textarea>
          </label>

          <button type="submit">Save Workout</button>
        </form>
      </section>

      <section class="card">
        <h2>Goals</h2>
        <form id="goals-form" class="grid">
          <label>
            Strength goal (kg)
            <input type="number" id="goal-strength" min="0" step="0.1" placeholder="e.g. 100" />
          </label>

          <label>
            Run goal distance (km)
            <input type="number" id="goal-run" min="0" step="0.01" placeholder="e.g. 10" />
          </label>

          <label>
            Sprint goal best time (sec)
            <input type="number" id="goal-sprint" min="0" step="0.01" placeholder="e.g. 14.2" />
          </label>

          <button type="submit">Save Goals</button>
        </form>

        <div id="goal-progress" class="goal-progress"></div>
      </section>

      <section class="card">
        <h2>Progress</h2>
        <div id="summary" class="summary"></div>

        <h3>Recent Workouts</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Main Metric</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
